## Signal sources.
##
## Each entry becomes one Source instance. `id` must be unique — it's used
## as a prefix in logs, and also namespaces per-source state in state.json.
##
## Sources are tried in the order below on every cron tick. One flaky source
## never blocks the others.
##
## Environment variable interpolation: any string containing ${FOO} is
## replaced by os.environ["FOO"] at load time. Handy for secrets.

sources:
  ############################################################
  # Reddit — primary signal. Free, no auth, high signal-to-noise.
  ############################################################
  - id: reddit
    type: reddit
    enabled: true
    options:
      subreddits:
        # r/PokemonRestocks is the highest-signal free source we have and
        # it works reliably from GitHub Actions runners.
        # r/PKMNTCGDeals is disabled by default because Reddit's per-ASN
        # throttle 429s our second consecutive request from a cloud IP,
        # even with a 6-second spacer between calls. If you run this
        # from a residential IP (e.g. a home server), safely add it back.
        - PokemonRestocks
        # - PKMNTCGDeals
      limit: 25
      # Subreddits are already Pokemon-restock-focused, so we DO NOT filter
      # at the source level — subscriber-level `filters.retailers` /
      # `filters.keywords` handles the "only tell me about pokemoncenter"
      # cut. Leaving this empty means every post gets forwarded to the
      # dispatcher and then narrowed per subscriber.
      keyword_hints: []

  ############################################################
  # Twitter/X via public Nitter mirrors. DISABLED BY DEFAULT.
  #
  # As of mid-2026 every public Nitter mirror (xcancel.com,
  # nitter.privacyredirect.com, nitter.poast.org, tiekoetter.com,
  # nitter.space, ...) blocks known cloud-provider IP ranges — including
  # GitHub Actions runners — via Cloudflare or their own reverse-proxy.
  # From a CI runner this source produces 100% 403s and 0 events, so we
  # leave it disabled. Re-enable only if you host from a residential IP.
  ############################################################
  - id: twitter
    type: nitter
    enabled: false
    options:
      handles:
        - PokemonStockUS
        - PokeTCGAlerts
        - PokemonDealsTCG
      keyword_hints:
        - "pokemon center"
        - "queue"
        - "restock"
        - "drop"
        - "live"

  ############################################################
  # Generic RSS. Point at any feed you trust (community webhook mirrors,
  # TrackaLacker RSS if they publish one, etc). Duplicate this block per feed.
  ############################################################
  # - id: trackalacker_rss
  #   type: rss
  #   enabled: false
  #   options:
  #     url: "https://example.com/feed.xml"
  #     retailer: pokemoncenter
  #     region: US
  #     keyword_hints: ["tcg", "pokemon center"]

  ############################################################
  # DIRECT queue-it detector — CONFIRMATION-ONLY.
  #
  # This source hits https://www.pokemoncenter.com/ once per run with
  # browser-like TLS (curl_cffi impersonation) and inspects the response
  # for queue-it markers (URL redirect to *.queue-it.net, QueueIT
  # cookies, or known queue-page text).
  #
  # The dispatcher DOES NOT push a notification when queueit fires alone.
  # Its role is purely to CONFIRM Reddit-based signals — when queueit
  # sees the queue within 30 min of a Reddit event about pokemoncenter,
  # the Reddit alert gets labelled [HIGH] instead of [MED].
  #
  # See dispatch.py's module docstring for the full correlation logic.
  #
  # Caveats:
  #   * Pokemon Center ToS technically forbids "robots". At 1 request /
  #     5 min we are ~10x below any commercial-scraper threshold, but
  #     you're on your own if Akamai eventually blocks GitHub Actions
  #     IPs. The source auto-cools-down 30 min on any 403/412/429.
  #   * Requires curl_cffi (installed automatically by the workflow
  #     when enabled: true is set here).
  ############################################################
  - id: queueit
    type: queueit
    enabled: true
    options:
      url: "https://www.pokemoncenter.com/"
      impersonate_choices:
        - chrome131
        - chrome124
        - chrome120
