## Signal sources.
##
## Each entry becomes one Source instance. `id` must be unique — it's used
## as a prefix in logs, and also namespaces per-source state in state.json.
##
## Sources are tried in the order below on every cron tick. One flaky source
## never blocks the others.
##
## Environment variable interpolation: any string containing ${FOO} is
## replaced by os.environ["FOO"] at load time. Handy for secrets.

sources:
  ############################################################
  # Reddit — primary signal. Free, no auth, high signal-to-noise.
  ############################################################
  - id: reddit
    type: reddit
    enabled: true
    options:
      # All 4 subs are pulled in a SINGLE HTTP request via Reddit's
      # built-in combined-feed URL (/r/a+b+c+d/new.rss). This dodges the
      # per-ASN throttle that used to 429 our 2nd consecutive request
      # from a GH Actions IP — one connection = one rate-limit hit.
      subreddits:
        - PokemonRestocks  # highest signal, restock-focused
        - PKMNTCGDeals     # deals + restocks
        - PokeInvesting    # investors post drops early for flipping
        - pokemongoing     # broader collector chatter
      limit: 25
      # Subreddits are already Pokemon-focused, so we DO NOT filter at
      # the source level — subscriber-level `filters.retailers` /
      # `filters.keywords` handles the "only tell me about pokemoncenter"
      # cut. Leaving this empty means every post gets forwarded to the
      # dispatcher and then narrowed per subscriber.
      keyword_hints: []

  ############################################################
  # Twitter/X via public Nitter mirrors. DISABLED BY DEFAULT.
  #
  # As of mid-2026 every public Nitter mirror (xcancel.com,
  # nitter.privacyredirect.com, nitter.poast.org, tiekoetter.com,
  # nitter.space, ...) blocks known cloud-provider IP ranges — including
  # GitHub Actions runners — via Cloudflare or their own reverse-proxy.
  # From a CI runner this source produces 100% 403s and 0 events, so we
  # leave it disabled. Re-enable only if you host from a residential IP.
  ############################################################
  - id: twitter
    type: nitter
    enabled: false
    options:
      handles:
        - PokemonStockUS
        - PokeTCGAlerts
        - PokemonDealsTCG
      keyword_hints:
        - "pokemon center"
        - "queue"
        - "restock"
        - "drop"
        - "live"

  ############################################################
  # Generic RSS. Point at any feed you trust (community webhook mirrors,
  # TrackaLacker RSS if they publish one, etc). Duplicate this block per feed.
  ############################################################
  # - id: trackalacker_rss
  #   type: rss
  #   enabled: false
  #   options:
  #     url: "https://example.com/feed.xml"
  #     retailer: pokemoncenter
  #     region: US
  #     keyword_hints: ["tcg", "pokemon center"]

  ############################################################
  # DIRECT queue-it detector — CONFIRMATION-ONLY + GATED.
  #
  # This source hits https://www.pokemoncenter.com/ with browser-like
  # TLS (curl_cffi impersonation) and inspects the response for
  # queue-it markers (URL redirect to *.queue-it.net, QueueIT cookies,
  # or known queue-page text).
  #
  # Behaviour changes from a "vanilla" source:
  #   1. NEVER dispatches on its own. When it fires, the dispatcher just
  #      records a "confirmation" and uses it to upgrade Reddit's next
  #      alert to [HIGH] instead of [MED].
  #   2. CONFIDENCE-GATED. It only actually makes the HTTP request when
  #      >=`gate_min_sources` distinct derivative sources have logged a
  #      qualifying signal (kind in {queue,restock,preorder}, retailer
  #      in {pokemoncenter,unknown}) within `gate_window_minutes`. On
  #      quiet ticks it just skips, keeping our PC traffic to ~0.
  #   3. BURST MODE. When it successfully detects a queue, the gate is
  #      bypassed for the following 30 min so we can catch multi-wave
  #      restocks and the queue re-opening moment.
  #
  # Trade-off: a drop that generates zero Reddit chatter would go
  # undetected. In practice Reddit chatter shows up within seconds of
  # a drop going live, well inside our 5-min tick.
  #
  # Caveats:
  #   * Pokemon Center ToS technically forbids "robots". Gating means
  #     we only send ~5–15 requests/day on active days, ~0 on quiet
  #     days — well below any commercial-scraper threshold. Auto-
  #     cooldowns for 30 min on any 403/412/429.
  #   * Requires curl_cffi (installed automatically by the workflow
  #     when enabled: true is set here).
  ############################################################
  - id: queueit
    type: queueit
    enabled: true
    options:
      url: "https://www.pokemoncenter.com/"
      # Confidence gate. Lower = more probes; higher = fewer probes but
      # some drops missed.
      gate_min_sources: 1        # at least this many derivative sources
      gate_window_minutes: 20    # ...must have fired within this window
      # Profiles supported by curl_cffi 0.7.x (what our
      # requirements-queueit.txt pins). If you bump to 0.8+ you can add
      # chrome131 / chrome133 back to this list.
      impersonate_choices:
        - chrome124
        - chrome120
        - chrome116
