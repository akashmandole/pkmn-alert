name: monitor

# Runs the drop monitor once every 5 minutes (the shortest cron interval
# GitHub allows) and commits any state changes back to the repo so the
# dedupe cache persists between runs.
#
# Scheduled workflows only fire on the default branch, and GitHub disables
# them after 60 days of no activity — the state-commit-back handles that
# too because every run that finds something writes to the repo.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (don't send notifications)"
        required: false
        default: "false"
      seed_only:
        description: "Mark all current events as seen without notifying"
        required: false
        default: "false"

permissions:
  contents: write   # needed to commit state.json back

concurrency:
  group: monitor
  cancel-in-progress: false   # don't kill a running tick; queue behind it

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 4     # each tick must finish inside its cron window

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch enough history to make the commit-back push cleanly.
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-queueit.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Only pull in curl_cffi (large native binary) when the user has
          # opted into the queueit source. Keeps cold-start under a second
          # for the common case.
          queueit_enabled=$(python -c "
          import yaml, sys
          data = yaml.safe_load(open('sources.yaml')) or {}
          for s in data.get('sources', []):
              if s.get('type') == 'queueit' and s.get('enabled'):
                  print('yes'); sys.exit()
          ")
          if [ "$queueit_enabled" = "yes" ]; then
            echo "queueit source enabled — installing curl_cffi"
            pip install -r requirements-queueit.txt
          fi

      - name: Run monitor
        env:
          # === user-configurable secrets ===
          # Set these in your repo Settings -> Secrets and variables -> Actions.
          NTFY_TOPIC:         ${{ secrets.NTFY_TOPIC }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          # Add your own here and reference via ${VAR} in subscribers.yaml.
        run: |
          # Small random pre-jitter so we don't hammer sources on the tick
          # boundary — 0..60s randomized inside the run.
          python -m pkmn_alert \
            --sources sources.yaml \
            --subscribers subscribers.yaml \
            --state state.json \
            --jitter-max-s 60 \
            $( [ "${{ github.event.inputs.dry_run }}" = "true" ] && echo --dry-run ) \
            $( [ "${{ github.event.inputs.seed_only }}" = "true" ] && echo --seed-only ) \
            -v

      - name: Commit updated state
        # Only push if state.json actually changed. Uses [skip ci] in the
        # commit message so this push does NOT re-trigger the workflow.
        run: |
          if [ -z "$(git status --porcelain state.json)" ]; then
            echo "no state change"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "state: update dedupe cache [skip ci]"
          git push
